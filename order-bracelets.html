<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>طلب الأساور - ORZI 1998</title>
    <meta name="description" content="اطلب قطعتك المميزة من تشكيلة ORZI Heritage Bracelets" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Amiri', serif;
        background: #fafaf8;
        min-height: 100vh;
        color: #243247;
        position: relative;
      }

      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: radial-gradient(circle at 1px 1px, rgba(36, 50, 71, 0.03) 1px, transparent 0);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes slideInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 24px;
        position: relative;
        z-index: 1;
      }

      header {
        background: #ffffff;
        backdrop-filter: blur(10px);
        padding: 24px 0;
        box-shadow: 0 1px 0 rgba(36, 50, 71, 0.08);
        position: sticky;
        top: 0;
        z-index: 100;
        transition: all 0.3s ease;
      }

      .header-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        font-family: 'Cinzel', serif;
        font-size: 20px;
        font-weight: 500;
        color: #243247;
        letter-spacing: 0.15em;
      }

      .back-button {
        background: transparent;
        border: 1px solid rgba(36, 50, 71, 0.15);
        color: #243247;
        padding: 10px 24px;
        font-family: 'Cinzel', serif;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.08em;
        cursor: pointer;
        transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        text-decoration: none;
        display: inline-block;
        border-radius: 2px;
      }

      .back-button:hover {
        background: #243247;
        border-color: #243247;
        color: #ffffff;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(36, 50, 71, 0.15);
      }

      .hero-section {
        padding: 100px 0 80px;
        text-align: center;
        animation: fadeIn 0.8s ease-out;
      }

      .hero-title {
        font-family: 'Cinzel', serif;
        font-size: 52px;
        font-weight: 600;
        color: #243247;
        margin-bottom: 28px;
        line-height: 1.3;
        letter-spacing: -0.02em;
        animation: fadeInUp 0.8s ease-out 0.2s both;
      }

      .hero-subtitle {
        font-size: 18px;
        color: #243247;
        opacity: 0.65;
        max-width: 560px;
        margin: 0 auto;
        line-height: 1.7;
        font-weight: 400;
        animation: fadeInUp 0.8s ease-out 0.4s both;
      }

      .divider {
        width: 80px;
        height: 1px;
        background: #243247;
        opacity: 0.2;
        margin: 48px auto;
        animation: fadeInUp 0.8s ease-out 0.6s both;
      }

      .form-container {
        background: #ffffff;
        border: 1px solid rgba(36, 50, 71, 0.06);
        border-radius: 4px;
        padding: 72px 64px;
        margin: 0 auto 120px;
        max-width: 820px;
        box-shadow: 0 2px 40px rgba(36, 50, 71, 0.04);
        animation: fadeInUp 0.8s ease-out 0.3s both;
      }

      .section-title {
        font-family: 'Cinzel', serif;
        font-size: 24px;
        font-weight: 500;
        color: #243247;
        margin-bottom: 48px;
        text-align: center;
        letter-spacing: 0.02em;
      }

      .form-group {
        margin-bottom: 32px;
        animation: slideInUp 0.5s ease-out both;
      }

      .form-group:nth-child(1) { animation-delay: 0.1s; }
      .form-group:nth-child(2) { animation-delay: 0.15s; }
      .form-group:nth-child(3) { animation-delay: 0.2s; }
      .form-group:nth-child(4) { animation-delay: 0.25s; }
      .form-group:nth-child(5) { animation-delay: 0.3s; }

      .form-label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #243247;
        margin-bottom: 12px;
        opacity: 0.7;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        font-family: 'Cinzel', serif;
      }

      .required {
        color: #c44;
        margin-right: 4px;
      }

      .form-input,
      .form-select,
      .form-textarea {
        width: 100%;
        padding: 16px 18px;
        border: 1px solid rgba(36, 50, 71, 0.12);
        border-radius: 2px;
        font-family: 'Amiri', serif;
        font-size: 16px;
        color: #243247;
        background: #fafaf9;
        transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .form-input:hover,
      .form-select:hover,
      .form-textarea:hover {
        border-color: rgba(36, 50, 71, 0.25);
        background: #ffffff;
      }

      .form-input:focus,
      .form-select:focus,
      .form-textarea:focus {
        outline: none;
        border-color: #243247;
        box-shadow: 0 0 0 1px #243247, 0 2px 12px rgba(36, 50, 71, 0.08);
        background: #ffffff;
      }

      .form-input::placeholder,
      .form-textarea::placeholder {
        color: rgba(36, 50, 71, 0.4);
      }

      .form-select {
        cursor: pointer;
      }

      .form-textarea {
        resize: vertical;
        min-height: 120px;
        line-height: 1.6;
      }

      .error-message {
        color: #c44;
        font-size: 14px;
        margin-top: 6px;
      }

      .bracelets-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 32px;
        margin-bottom: 64px;
      }

      .bracelet-card {
        background: #ffffff;
        border: 1px solid rgba(36, 50, 71, 0.08);
        border-radius: 2px;
        padding: 28px 24px;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        animation: slideInUp 0.6s ease-out both;
      }

      .bracelet-card:nth-child(1) { animation-delay: 0.1s; }
      .bracelet-card:nth-child(2) { animation-delay: 0.2s; }
      .bracelet-card:nth-child(3) { animation-delay: 0.3s; }

      .bracelet-card:hover {
        border-color: rgba(36, 50, 71, 0.2);
        background: #ffffff;
        transform: translateY(-8px);
        box-shadow: 0 12px 40px rgba(36, 50, 71, 0.08);
      }

      .bracelet-image {
        width: 100%;
        height: 220px;
        object-fit: cover;
        border-radius: 2px;
        margin-bottom: 24px;
        transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .bracelet-card:hover .bracelet-image {
        transform: scale(1.03);
      }

      .bracelet-name {
        font-family: 'Cinzel', serif;
        font-size: 18px;
        font-weight: 500;
        color: #243247;
        text-align: center;
        margin-bottom: 6px;
        letter-spacing: 0.05em;
      }

      .bracelet-label {
        font-size: 13px;
        color: #243247;
        opacity: 0.55;
        text-align: center;
        margin-bottom: 20px;
        min-height: 20px;
        font-weight: 400;
      }

      .quantity-control {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }

      .quantity-label {
        font-size: 14px;
        color: #243247;
        opacity: 0.75;
      }

      .quantity-input {
        width: 70px;
        padding: 10px 12px;
        text-align: center;
        border: 1px solid rgba(36, 50, 71, 0.15);
        border-radius: 2px;
        font-family: 'Amiri', serif;
        font-size: 16px;
        font-weight: 500;
        color: #243247;
        background: #fafaf9;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .quantity-input:hover {
        border-color: rgba(36, 50, 71, 0.3);
        background: #ffffff;
      }

      .quantity-input:focus {
        outline: none;
        border-color: #243247;
        background: #ffffff;
        box-shadow: 0 0 0 1px #243247;
      }

      .submit-button {
        width: 100%;
        padding: 20px 48px;
        background: #243247;
        color: #ffffff;
        border: none;
        border-radius: 2px;
        font-family: 'Cinzel', serif;
        font-size: 15px;
        font-weight: 500;
        letter-spacing: 0.12em;
        cursor: pointer;
        transition: all 0.45s cubic-bezier(0.4, 0, 0.2, 1);
        margin-top: 56px;
        text-transform: uppercase;
        box-shadow: 0 4px 20px rgba(36, 50, 71, 0.15);
        position: relative;
        overflow: hidden;
      }

      .submit-button::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
      }

      .submit-button:hover:not(:disabled)::before {
        width: 400px;
        height: 400px;
      }

      .submit-button:hover:not(:disabled) {
        background: #1a2b3c;
        transform: translateY(-3px);
        box-shadow: 0 12px 40px rgba(36, 50, 71, 0.25);
      }

      .submit-button:active:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 6px 24px rgba(36, 50, 71, 0.2);
      }

      .submit-button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(8px);
        z-index: 1000;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .modal.active {
        display: flex;
        animation: fadeIn 0.3s ease;
      }

      .modal-content {
        background: white;
        border-radius: 4px;
        padding: 64px 56px;
        max-width: 480px;
        width: 100%;
        text-align: center;
        animation: modalFadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 20px 60px rgba(36, 50, 71, 0.2);
      }

      @keyframes modalFadeIn {
        from {
          opacity: 0;
          transform: scale(0.92) translateY(20px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      .success-icon {
        width: 72px;
        height: 72px;
        background: rgba(36, 50, 71, 0.06);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 32px;
        animation: fadeIn 0.6s ease 0.2s both;
      }

      .success-icon svg {
        width: 36px;
        height: 36px;
        stroke: #243247;
        stroke-width: 2;
      }

      .modal-title {
        font-family: 'Cinzel', serif;
        font-size: 26px;
        font-weight: 500;
        color: #243247;
        margin-bottom: 16px;
        letter-spacing: 0.02em;
      }

      .modal-text {
        font-family: 'Amiri', serif;
        font-size: 17px;
        color: #243247;
        opacity: 0.65;
        margin-bottom: 40px;
        line-height: 1.7;
      }

      .modal-button {
        background: #243247;
        color: #ffffff;
        border: none;
        padding: 14px 40px;
        border-radius: 2px;
        font-family: 'Cinzel', serif;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.1em;
        cursor: pointer;
        transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        text-transform: uppercase;
        box-shadow: 0 4px 16px rgba(36, 50, 71, 0.15);
      }

      .modal-button:hover {
        background: #1a2b3c;
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(36, 50, 71, 0.2);
      }

      .modal-button:active {
        transform: translateY(0);
        box-shadow: 0 4px 12px rgba(36, 50, 71, 0.15);
      }

      .trust-section {
        margin-top: 64px;
        padding-top: 48px;
        border-top: 1px solid rgba(36, 50, 71, 0.08);
        text-align: center;
        animation: fadeInUp 0.8s ease-out 0.5s both;
      }

      .trust-text {
        font-family: 'Amiri', serif;
        font-size: 17px;
        color: #243247;
        opacity: 0.6;
        line-height: 1.8;
        max-width: 500px;
        margin: 0 auto;
        font-weight: 400;
      }

      .trust-icon {
        width: 48px;
        height: 1px;
        background: #243247;
        opacity: 0.15;
        margin: 0 auto 32px;
      }

      @media (max-width: 768px) {
        .form-container {
          padding: 48px 32px;
        }

        .hero-title {
          font-size: 36px;
        }

        .hero-subtitle {
          font-size: 16px;
        }

        .bracelets-grid {
          grid-template-columns: 1fr;
        }

        .header-content {
          flex-direction: column;
          gap: 16px;
        }

        .submit-button {
          padding: 18px 40px;
          font-size: 14px;
        }

        .trust-section {
          margin-top: 48px;
          padding-top: 40px;
        }

        .trust-text {
          font-size: 15px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container">
        <div class="header-content">
          <h1 class="logo">ORZI 1998</h1>
          <a href="/" class="back-button">العودة للموقع ←</a>
        </div>
      </div>
    </header>

    <main>
      <section class="hero-section">
        <div class="container">
          <h2 class="hero-title">اطلب قطعتك من ORZI</h2>
          <p class="hero-subtitle">
            اختر تصميمك المفضل ودعنا نصنع لك قطعة تعبّر عن هويتك.
          </p>
          <div class="divider"></div>
        </div>
      </section>

      <div class="container">
        <div class="form-container">
          <h3 class="section-title">اختر التصميم والكمية</h3>

          <form id="orderForm">
            <div class="bracelets-grid">
              <div class="bracelet-card">
                <img src="/straight.jpg" alt="AURA" class="bracelet-image" />
                <h4 class="bracelet-name">AURA</h4>
                <p class="bracelet-label">تصميم مستقيم</p>
                <div class="quantity-control">
                  <label for="straightQty" class="quantity-label">الكمية:</label>
                  <input
                    type="number"
                    id="straightQty"
                    name="straightQty"
                    min="0"
                    max="10"
                    value="0"
                    class="quantity-input"
                  />
                </div>
              </div>

              <div class="bracelet-card">
                <img src="/curved.jpg" alt="HARMONIA" class="bracelet-image" />
                <h4 class="bracelet-name">HARMONIA</h4>
                <p class="bracelet-label">تصميم منحني</p>
                <div class="quantity-control">
                  <label for="curvedQty" class="quantity-label">الكمية:</label>
                  <input
                    type="number"
                    id="curvedQty"
                    name="curvedQty"
                    min="0"
                    max="10"
                    value="0"
                    class="quantity-input"
                  />
                </div>
              </div>

              <div class="bracelet-card">
                <img src="/curvedgold.jpg" alt="SOPHIA" class="bracelet-image" />
                <h4 class="bracelet-name">SOPHIA</h4>
                <p class="bracelet-label">حصري للنساء</p>
                <div class="quantity-control">
                  <label for="curvedGoldQty" class="quantity-label">الكمية:</label>
                  <input
                    type="number"
                    id="curvedGoldQty"
                    name="curvedGoldQty"
                    min="0"
                    max="10"
                    value="0"
                    class="quantity-input"
                  />
                </div>
              </div>
            </div>

            <div class="divider"></div>

            <h3 class="section-title">معلومات التوصيل</h3>

            <div class="form-group">
              <label class="form-label">
                <span class="required">*</span>
                الاسم
              </label>
              <input
                type="text"
                id="name"
                name="name"
                class="form-input"
                placeholder="أدخل اسمك الكامل"
                required
              />
              <div id="nameError" class="error-message"></div>
            </div>

            <div class="form-group">
              <label class="form-label">
                <span class="required">*</span>
                رقم الهاتف
              </label>
              <input
                type="tel"
                id="phone"
                name="phone"
                class="form-input"
                placeholder="01xxxxxxxxx"
                required
              />
              <div id="phoneError" class="error-message"></div>
            </div>

            <div class="form-group">
              <label class="form-label">
                <span class="required">*</span>
                المحافظة
              </label>
              <select id="governorate" name="governorate" class="form-select" required>
                <option value="">اختر المحافظة</option>
                <option value="القاهرة">القاهرة</option>
                <option value="الجيزة">الجيزة</option>
              </select>
              <div id="governorateError" class="error-message"></div>
            </div>

            <div class="form-group">
              <label class="form-label">
                <span class="required">*</span>
                المنطقة
              </label>
              <select id="area" name="area" class="form-select" required disabled>
                <option value="">اختر المنطقة</option>
              </select>
              <div id="areaError" class="error-message"></div>
            </div>

            <div class="form-group">
              <label class="form-label">
                <span class="required">*</span>
                العنوان بالتفصيل
              </label>
              <textarea
                id="address"
                name="address"
                class="form-textarea"
                placeholder="الشارع، رقم المبنى، الدور، معالم قريبة..."
                required
              ></textarea>
              <div id="addressError" class="error-message"></div>
            </div>

            <button type="submit" id="submitBtn" class="submit-button">
              أكمل طلبك الآن
            </button>
          </form>

          <div class="trust-section">
            <div class="trust-icon"></div>
            <p class="trust-text">
              كل قطعة من ORZI تُصنع بعناية<br/>
              لترافقك بأسلوب خالد.
            </p>
          </div>
        </div>
      </div>
    </main>

    <div id="successModal" class="modal">
      <div class="modal-content">
        <div class="success-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
          </svg>
        </div>
        <h3 class="modal-title">تم استلام طلبك</h3>
        <p class="modal-text">سنتواصل معك خلال ٢٤ ساعة</p>
        <button class="modal-button" onclick="closeModal()">شكراً</button>
      </div>
    </div>

    <script>
      const governorates = {
        'القاهرة': [
          'مدينة نصر',
          'المعادي',
          'الزمالك',
          'مصر الجديدة',
          'التجمع الخامس',
          'الشروق',
          'المقطم',
          'حلوان',
          'المعصرة',
          'المنيل'
        ],
        'الجيزة': [
          'الدقي',
          'المهندسين',
          'الهرم',
          'فيصل',
          'العمرانية',
          '6 أكتوبر',
          'الشيخ زايد',
          'الحوامدية',
          'البدرشين',
          'أوسيم',
          'البحيرة',
          'الوراق'
        ]
      };

      const governorateSelect = document.getElementById('governorate');
      const areaSelect = document.getElementById('area');
      const form = document.getElementById('orderForm');
      const submitBtn = document.getElementById('submitBtn');
      const modal = document.getElementById('successModal');

      governorateSelect.addEventListener('change', function() {
        const selectedGov = this.value;
        areaSelect.innerHTML = '<option value="">اختر المنطقة</option>';

        if (selectedGov && governorates[selectedGov]) {
          areaSelect.disabled = false;
          governorates[selectedGov].forEach(area => {
            const option = document.createElement('option');
            option.value = area;
            option.textContent = area;
            areaSelect.appendChild(option);
          });
        } else {
          areaSelect.disabled = true;
        }

        clearError('governorateError');
      });

      function clearError(errorId) {
        document.getElementById(errorId).textContent = '';
      }

      function showError(errorId, message) {
        document.getElementById(errorId).textContent = message;
      }

      function validateForm() {
        let isValid = true;

        document.querySelectorAll('.error-message').forEach(el => el.textContent = '');

        const name = document.getElementById('name').value.trim();
        if (!name) {
          showError('nameError', 'الاسم مطلوب');
          isValid = false;
        }

        const phone = document.getElementById('phone').value.trim();
        if (!phone) {
          showError('phoneError', 'رقم الهاتف مطلوب');
          isValid = false;
        }

        const governorate = document.getElementById('governorate').value;
        if (!governorate) {
          showError('governorateError', 'المحافظة مطلوبة');
          isValid = false;
        }

        const area = document.getElementById('area').value;
        if (!area) {
          showError('areaError', 'المنطقة مطلوبة');
          isValid = false;
        }

        const address = document.getElementById('address').value.trim();
        if (!address) {
          showError('addressError', 'العنوان مطلوب');
          isValid = false;
        }

        const straightQty = parseInt(document.getElementById('straightQty').value) || 0;
        const curvedQty = parseInt(document.getElementById('curvedQty').value) || 0;
        const curvedGoldQty = parseInt(document.getElementById('curvedGoldQty').value) || 0;

        if (straightQty === 0 && curvedQty === 0 && curvedGoldQty === 0) {
          showError('addressError', 'اختر كمية من منتج واحد على الأقل');
          isValid = false;
        }

        return isValid;
      }

      let lastSubmitTime = 0;

      form.addEventListener('submit', async function(e) {
        e.preventDefault();

        const now = Date.now();
        if (now - lastSubmitTime < 1000) {
          return;
        }
        lastSubmitTime = now;

        if (!validateForm()) {
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'جاري المعالجة...';

        const formData = {
          name: document.getElementById('name').value.trim(),
          phone: document.getElementById('phone').value.trim(),
          governorate: document.getElementById('governorate').value,
          area: document.getElementById('area').value,
          address: document.getElementById('address').value.trim(),
          straightQty: parseInt(document.getElementById('straightQty').value) || 0,
          curvedQty: parseInt(document.getElementById('curvedQty').value) || 0,
          curvedGoldQty: parseInt(document.getElementById('curvedGoldQty').value) || 0,
          totalPrice: (parseInt(document.getElementById('straightQty').value) || 0) * 360 +
                      (parseInt(document.getElementById('curvedQty').value) || 0) * 360 +
                      (parseInt(document.getElementById('curvedGoldQty').value) || 0) * 360,
          timestamp: new Date().toISOString()
        };

        try {
          const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby8uj_Mc166lFj9mVHIrVHUHm00SYGbjNT-7_0xzPGnEF12IYU0CiD5QZOA3771r6mW/exec';

          await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(formData),
          });

          modal.classList.add('active');
          form.reset();
          areaSelect.disabled = true;
        } catch (error) {
          console.error('Error submitting form:', error);
          modal.classList.add('active');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'أكمل طلبك الآن';
        }
      });

      function closeModal() {
        modal.classList.remove('active');
      }

      modal.addEventListener('click', function(e) {
        if (e.target === modal) {
          closeModal();
        }
      });

      ['name', 'phone', 'area', 'address'].forEach(fieldId => {
        document.getElementById(fieldId).addEventListener('input', function() {
          clearError(fieldId + 'Error');
        });
      });

      areaSelect.addEventListener('change', function() {
        clearError('areaError');
      });
    </script>
  </body>
</html>
